{% extends "base.html" %}
{% block content %}
<h1>Graph Visualization</h1>
<div id="graph-container" style="width:100%;height:600px;border:1px solid #ccc;position:relative;">
  <svg id="graph-svg" width="100%" height="100%"></svg>
</div>
<script src="https://d3js.org/d3.v7.min.js"></script>
<script>
(function() {
  const kindColor = {
    Concept: 'steelblue', KernelInvariant: 'crimson', FailureMode: 'darkorange',
    InteractionProtocol: 'mediumpurple', Subsystem: 'seagreen',
    PerformanceProfile: 'teal', OptimizationGoal: 'gold',
    UseCaseScenario: 'coral', Kernel: 'darkslategray',
    CompatibilityAssessment: 'sienna', ComparativeAnalysis: 'slateblue',
    Source: 'gray', Evidence: 'gray', Advisory: 'gray',
    Problem: '#ef5350', Observation: '#ff7043', Discussion: '#ffa726',
    Benchmark: '#66bb6a', Rejection: '#bf360c', Vulnerability: '#b71c1c',
    Fix: '#43a047', Proposal: '#1565c0'
  };
  const edgeColor = {
    'belongs-to': '#27ae60',
    'extracted-from': '#95a5a6',
    'sourced-from': '#7f8c8d',
    'alternative-to': '#3498db',
    'refines': '#2980b9',
    'contradicts': '#e74c3c',
    'prerequisite': '#f39c12',
    'supersedes': '#d35400',
    'assessed-by': '#8e44ad',
    'governed-by': '#c0392b',
    'triggered-by': '#e67e22',
    'constrains-composition': '#9b59b6',
    'profiled-by': '#1abc9c',
    'assesses-compatibility': '#16a085',
    'contributes-to': '#2c3e50',
    'suited-for': '#e91e63',
    'compares': '#34495e',
    'implemented-in': '#795548',
    'identifies-problem': '#ef5350',
    'observes': '#ff7043',
    'discusses': '#ffa726',
    'benchmarks': '#66bb6a',
    'motivated-by': '#ab47bc',
    'exploits': '#b71c1c',
    'affects-subsystem': '#d32f2f',
    'fixes': '#2e7d32',
    'patches': '#43a047',
    'addresses': '#388e3c',
    'grounded-in': '#1565c0',
    'resulted-in': '#0277bd',
    'contradicted-by': '#c62828',
    'rejected-for': '#bf360c'
  };
  const edgeDash = {
    'governed-by': '6,3', 'triggered-by': '3,3',
    'contradicts': '4,4', 'alternative-to': '8,4',
    'contradicted-by': '4,4'
  };

  const container = document.getElementById('graph-container');
  const width = container.clientWidth;
  const height = container.clientHeight;
  const svg = d3.select('#graph-svg').attr('viewBox', [0, 0, width, height]);

  const g = svg.append('g');
  svg.call(d3.zoom().on('zoom', (e) => g.attr('transform', e.transform)));

  fetch('/graph').then(r => r.json()).then(data => {
    const nodeMap = {};
    data.nodes.forEach((n, i) => { n.index = i; nodeMap[n.id] = n; });
    const links = data.edges.map(e => ({
      source: nodeMap[e.source_id], target: nodeMap[e.target_id], kind: e.kind
    })).filter(l => l.source && l.target);

    const edgeCounts = {};
    links.forEach(l => {
      edgeCounts[l.source.id] = (edgeCounts[l.source.id] || 0) + 1;
      edgeCounts[l.target.id] = (edgeCounts[l.target.id] || 0) + 1;
    });

    const sim = d3.forceSimulation(data.nodes)
      .force('link', d3.forceLink(links).distance(80))
      .force('charge', d3.forceManyBody().strength(-200))
      .force('center', d3.forceCenter(width / 2, height / 2))
      .force('collide', d3.forceCollide(20));

    const link = g.selectAll('line').data(links).join('line')
      .attr('stroke', d => edgeColor[d.kind] || '#ddd')
      .attr('stroke-width', 1.5)
      .attr('stroke-dasharray', d => edgeDash[d.kind] || null);

    const node = g.selectAll('circle').data(data.nodes).join('circle')
      .attr('r', d => 4 + Math.min((edgeCounts[d.id] || 0) * 1.5, 12))
      .attr('fill', d => kindColor[d.kind] || 'gray')
      .attr('stroke', '#fff').attr('stroke-width', 1)
      .style('cursor', 'pointer')
      .on('click', (e, d) => { window.location.href = '/concepts/' + d.id; })
      .call(d3.drag()
        .on('start', (e, d) => { if (!e.active) sim.alphaTarget(0.3).restart(); d.fx = d.x; d.fy = d.y; })
        .on('drag', (e, d) => { d.fx = e.x; d.fy = e.y; })
        .on('end', (e, d) => { if (!e.active) sim.alphaTarget(0); d.fx = null; d.fy = null; }));

    const displayFields = {
      Concept: ['name', null], Source: ['url', 80], Evidence: ['description', 60],
      Advisory: ['assessment', 60], Subsystem: ['name', null],
      KernelInvariant: ['predicate', 60], FailureMode: ['symptom', 60],
      InteractionProtocol: ['rule', 60], PerformanceProfile: ['metric', 40],
      CompatibilityAssessment: ['synergy', 60], OptimizationGoal: ['name', null],
      UseCaseScenario: ['name', null], ComparativeAnalysis: ['dimension', 60],
      Kernel: ['name', null],
      Problem: ['title', null], Observation: ['claim', 60],
      Discussion: ['title', null], Benchmark: ['metric', 40],
      Rejection: ['proposal_title', 60], Vulnerability: ['cve_id', null],
      Fix: ['title', 60], Proposal: ['name', null]
    };
    node.append('title').text(d => {
      const spec = displayFields[d.kind];
      let name = d.id;
      if (spec) {
        const val = d.attrs && d.attrs[spec[0]] ? d.attrs[spec[0]].toString().trim() : '';
        if (val) {
          name = spec[1] && val.length > spec[1] ? val.substring(0, spec[1]) + '...' : val;
        } else if (d.kind === 'Evidence') {
          name = 'Evidence ' + d.id.slice(-8);
        }
      }
      return name + ' (' + d.kind + ')';
    });

    sim.on('tick', () => {
      link.attr('x1', d => d.source.x).attr('y1', d => d.source.y)
          .attr('x2', d => d.target.x).attr('y2', d => d.target.y);
      node.attr('cx', d => d.x).attr('cy', d => d.y);
    });

    const presentNodeKinds = [...new Set(data.nodes.map(n => n.kind))].sort();
    const presentEdgeKinds = [...new Set(links.map(l => l.kind))].sort();

    const legend = d3.select('#graph-container').append('div')
      .attr('id', 'graph-legend')
      .style('position', 'absolute').style('top', '10px').style('right', '10px')
      .style('background', 'rgba(255,255,255,0.93)').style('padding', '10px 12px')
      .style('border', '1px solid #ccc').style('border-radius', '4px')
      .style('font-size', '12px').style('max-height', '560px').style('overflow-y', 'auto');

    legend.append('div').text('Node Kinds').style('font-weight', 'bold').style('margin-bottom', '4px');
    presentNodeKinds.forEach(k => {
      const row = legend.append('div').style('display', 'flex').style('align-items', 'center').style('margin', '2px 0');
      row.append('span').style('display', 'inline-block').style('width', '10px').style('height', '10px')
        .style('border-radius', '50%').style('background', kindColor[k] || 'gray').style('margin-right', '6px').style('flex-shrink', '0');
      row.append('span').text(k);
    });

    legend.append('div').text('Edge Kinds').style('font-weight', 'bold').style('margin-top', '10px').style('margin-bottom', '4px');
    presentEdgeKinds.forEach(k => {
      const row = legend.append('div').style('display', 'flex').style('align-items', 'center').style('margin', '2px 0');
      const line = row.append('svg').attr('width', 20).attr('height', 10).style('margin-right', '6px').style('flex-shrink', '0');
      line.append('line').attr('x1', 0).attr('y1', 5).attr('x2', 20).attr('y2', 5)
        .attr('stroke', edgeColor[k] || '#ddd').attr('stroke-width', 2)
        .attr('stroke-dasharray', edgeDash[k] || null);
      row.append('span').text(k);
    });
  });
})();
</script>
{% endblock %}
