<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>know_kernel</title>
  <style>
    body { font-family: monospace; max-width: 900px; margin: 2rem auto; padding: 0 1rem; }
    nav { margin-bottom: 1.5rem; }
    nav a { margin-right: 1rem; }
    table { border-collapse: collapse; width: 100%; }
    th, td { border: 1px solid #ccc; padding: 0.4rem 0.6rem; text-align: left; }
    .badge { display: inline-block; padding: 0.15rem 0.5rem; border-radius: 0.75rem; font-size: 0.85em; font-weight: bold; color: #fff; }
    .badge-safety { background: #c0392b; }
    .badge-liveness { background: #e67e22; }
    .badge-performance { background: #2980b9; }
    .badge-structural { background: #7f8c8d; }
    .badge-blast-kernel-wide { background: #c0392b; }
    .badge-blast-subsystem { background: #e67e22; }
    .badge-blast-local { background: #27ae60; }
    .badge-recovery-data-loss { background: #c0392b; }
    .badge-recovery-requires-restart { background: #e67e22; }
    .badge-recovery-self-healing { background: #27ae60; }
    .badge-kind { background: #34495e; font-size: 0.75em; }
    .card { border: 1px solid #bdc3c7; border-radius: 4px; padding: 0.6rem; margin: 0.4rem 0; }
    .edge-group { margin: 0.8rem 0; }
    .edge-group summary { cursor: pointer; font-weight: bold; }
    .edge-group .count { background: #ecf0f1; border-radius: 0.75rem; padding: 0.1rem 0.5rem; font-size: 0.8em; margin-left: 0.3rem; }
    blockquote { border-left: 3px solid #7f8c8d; margin: 0.5rem 0; padding: 0.3rem 0.8rem; color: #2c3e50; background: #f9f9f9; }
    .attrs-section { margin: 1rem 0; }
    .attrs-section h3 { margin-bottom: 0.3rem; }
  </style>
</head>
<body>
<nav>
  <a href="/">Dashboard</a>
  <a href="/concepts">All Nodes</a>
  <a href="/subsystems">Subsystems</a>
  <a href="/sources">Sources</a>
  <a href="/viz">Graph</a>
  <a href="/health">Health</a>
  <span style="display:inline-block;position:relative;margin-left:1rem;">
    <input type="text" id="search-input" placeholder="Search nodes..."
           hx-get="/api/search" hx-trigger="keyup changed delay:300ms"
           hx-target="#search-results" hx-swap="innerHTML"
           name="q" autocomplete="off"
           style="font-family:monospace;padding:0.2rem 0.4rem;">
    <div id="search-results" style="position:absolute;top:100%;left:0;z-index:100;background:#fff;border:1px solid #ccc;max-height:300px;overflow-y:auto;min-width:300px;display:none;"></div>
  </span>
</nav>
<script src="https://unpkg.com/htmx.org@1.9.12"></script>
<script>
document.body.addEventListener('htmx:afterSwap', function(e) {
  if (e.detail.target.id === 'search-results') {
    e.detail.target.style.display = e.detail.target.innerHTML.trim() ? 'block' : 'none';
  }
});
document.getElementById('search-input').addEventListener('blur', function() {
  setTimeout(function(){ document.getElementById('search-results').style.display = 'none'; }, 200);
});
document.getElementById('search-input').addEventListener('focus', function() {
  var r = document.getElementById('search-results');
  if (r.innerHTML.trim()) r.style.display = 'block';
});
</script>
{% block content %}{% endblock %}
</body>
</html>
