{% extends "base.html" %}
{% block content %}
<h1>{{ title | default("Nodes") }}</h1>
<p>{{ nodes | length }} item(s)</p>
<table>
  <thead><tr><th>ID</th><th>Kind</th></tr></thead>
  <tbody>
  {% for node in nodes %}
    <tr>
      <td><a href="/concepts/{{ node.id }}">{{ node.id }}</a></td>
      <td>{{ node.kind }}</td>
    </tr>
  {% else %}
    <tr><td colspan="2">No nodes.</td></tr>
  {% endfor %}
  </tbody>
</table>
{% endblock %}
